# ══════════════════════════════════════════════════════════════
# ORIVYA RICE — application.properties (PRODUCTION SECURE)
# ══════════════════════════════════════════════════════════════
#
# SECURITY RULES:
#   - NO secrets, passwords, or API keys in this file
#   - ALL sensitive values come from environment variables ONLY
#   - Safe to commit to GitHub
#   - ${VAR_NAME} = required (app crashes if not set → forces correct setup)
#   - ${VAR_NAME:default} = optional (uses default if not set)
#
# ══════════════════════════════════════════════════════════════

# ── SERVER ────────────────────────────────────────────────────
# Render sets PORT automatically — fallback to 8080 for local
server.port=${PORT:8080}
spring.application.name=orivya-backend

# ── DATABASE ──────────────────────────────────────────────────
# NO defaults — if these are missing, app fails fast with clear error
# Set in Render: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── CONNECTION POOL (tuned for Aiven free tier — max 5 connections) ──
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ───────────────────────────────────────────────────────
# update = safe for production (creates/alters tables, never drops)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Dialect auto-detected from driver — explicit setting avoids warning
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────
# NO default — must be set in Render as JWT_SECRET
# Minimum 32 characters. Generate with: openssl rand -base64 32
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── FILE UPLOAD ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ── SENDGRID EMAIL ────────────────────────────────────────────
# NO defaults — must be set in Render
# SENDGRID_API_KEY, SENDGRID_FROM_EMAIL, SENDGRID_FROM_NAME
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL}
sendgrid.from.name=${SENDGRID_FROM_NAME}

# ── LOGGING ───────────────────────────────────────────────────
# WARN in production (less noise), INFO locally
logging.level.com.orivya=${LOG_LEVEL:WARN}
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── ACTUATOR (used by Render health check) ────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never