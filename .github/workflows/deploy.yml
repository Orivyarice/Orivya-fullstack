name: Orivya Rice — Build Check

# ══════════════════════════════════════════════════════
# Simple workflow — just verifies the Spring Boot
# project compiles correctly on every push.
#
# No AWS, no SonarQube, no Docker needed.
# Render and Netlify handle deployment automatically.
# ══════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ✅ Build Spring Boot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven (skip tests for speed)
        working-directory: ./backend
        run: mvn clean package -DskipTests -B

      - name: ✅ Build successful
        run: echo "Spring Boot build passed! Render will auto-deploy."





