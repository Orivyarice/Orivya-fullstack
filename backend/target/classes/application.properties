# ══════════════════════════════════════════════════
# ORIVYA RICE — application.properties
# ══════════════════════════════════════════════════

# ── Server ──
server.port=8080
spring.application.name=orivya-backend


# ── DATABASE ──────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/orivya_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:satish2233}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── CONNECTION POOL (limits for free tier) ──────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=180000

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false


# ══════════════════════════════════════════════════
# JWT CONFIGURATION
# ══════════════════════════════════════════════════
jwt.secret=OrivyaRiceSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# ══════════════════════════════════════════════════
# FILE UPLOAD (Product Images)
# ══════════════════════════════════════════════════
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ══════════════════════════════════════════════════
# LOGGING
# ══════════════════════════════════════════════════
logging.level.com.orivya=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# 4. Paste the API key below 
# ══════════════════════════════════════════════════════
sendgrid.api.key=${SENDGRID_API_KEY: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}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:orivyaorganicrice@gmail.com}
sendgrid.from.name=${SENDGRID_FROM_NAME:Orivya}

# ── ACTUATOR (Render health check) ───────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never