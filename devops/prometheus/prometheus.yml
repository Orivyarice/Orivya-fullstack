# ══════════════════════════════════════════════════
# prometheus.yml — Monitoring Configuration
# Scrapes metrics from Spring Boot + System
# ══════════════════════════════════════════════════

global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # ── Spring Boot Backend (Actuator metrics) ──────
  - job_name: 'orivya-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['orivya-backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'orivya-backend'

  # ── Prometheus itself ───────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Node Exporter (Server CPU/Memory/Disk) ──────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ── MySQL Exporter ──────────────────────────────
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
