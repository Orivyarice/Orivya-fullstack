# ══════════════════════════════════════════════════
# ORIVYA RICE — application.properties
# ══════════════════════════════════════════════════

# ── Server ──
server.port=8080
spring.application.name=orivya-backend

# ══════════════════════════════════════════════════
# MYSQL DATABASE CONFIGURATION
# !! IMPORTANT: Change the password to YOUR MySQL password !!
# ══════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/orivya_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root

# ↓↓↓ CHANGE THIS TO YOUR ACTUAL MYSQL PASSWORD ↓↓↓
spring.datasource.password=satish2233
# Examples:
#   spring.datasource.password=1234
#   spring.datasource.password=mysql123
#   spring.datasource.password=          (if no password)

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# NOTE: Removed spring.jpa.properties.hibernate.dialect
# Hibernate auto-detects MySQL dialect — no need to specify it

# ══════════════════════════════════════════════════
# JWT CONFIGURATION
# ══════════════════════════════════════════════════
jwt.secret=OrivyaRiceSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
jwt.expiration=86400000

# ══════════════════════════════════════════════════
# FILE UPLOAD (Product Images)
# ══════════════════════════════════════════════════
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# ══════════════════════════════════════════════════
# LOGGING
# ══════════════════════════════════════════════════
logging.level.com.orivya=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
