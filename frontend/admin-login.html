<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login – Orivya Rice</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #0f2a15 0%, #1a5c2a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 44px;
      width: 100%; max-width: 440px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #1a5c2a, #2d7a3e);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
    }
    .logo h1 {
      font-family: 'Cinzel', serif;
      color: #1a5c2a; font-size: 26px; font-weight: 900;
      letter-spacing: 2px;
    }
    .logo p { color: #888; font-size: 13px; margin-top: 4px; }

    .badge {
      background: #fff3cd;
      border: 1px solid #c8922a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #7a4a1e;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 700;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px; font-weight: 700;
      color: #1a5c2a; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 13px 16px;
      border: 2px solid rgba(26,92,42,0.2);
      border-radius: 6px;
      font-family: 'Lato', sans-serif;
      font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #1a5c2a; }

    .error-box {
      background: #f8d7da; color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 6px; padding: 12px 14px;
      font-size: 13px; font-weight: 700;
      margin-bottom: 16px; display: none;
    }
    .success-box {
      background: #d4edda; color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 6px; padding: 12px 14px;
      font-size: 13px; font-weight: 700;
      margin-bottom: 16px; display: none;
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #1a5c2a, #2d7a3e);
      color: white; border: none;
      padding: 16px; border-radius: 6px;
      font-family: 'Cinzel', serif;
      font-weight: 700; font-size: 16px;
      cursor: pointer; letter-spacing: 1px;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,92,42,0.4); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .hint {
      background: #f0f7f0;
      border: 1px solid rgba(26,92,42,0.2);
      border-radius: 6px; padding: 14px 16px;
      margin-top: 20px; font-size: 13px; color: #555;
    }
    .hint strong { color: #1a5c2a; display: block; margin-bottom: 6px; }
    .hint code {
      background: #e8f5e9; color: #1a5c2a;
      padding: 2px 8px; border-radius: 3px;
      font-family: monospace; font-size: 13px;
    }

    .back-link {
      display: block; text-align: center;
      margin-top: 16px; color: #888; font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover { color: #1a5c2a; }
  </style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">⚙</div>
    <h1>ADMIN LOGIN</h1>
    <p>Orivya Rice — Admin Dashboard</p>
  </div>

  <!-- Admin badge -->
  <div class="badge">
    🔐 This page is for Admin users only
  </div>

  <!-- Error / Success -->
  <div class="error-box"   id="errorBox"></div>
  <div class="success-box" id="successBox"></div>

  <!-- Email -->
  <div class="form-group">
    <label>Admin Email</label>
    <input type="email" id="adminEmail"
           value="admin@orivya.com"
           placeholder="admin@orivya.com"
           autocomplete="username" />
  </div>

  <!-- Password -->
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="adminPassword"
           value="admin123"
           placeholder="Enter admin password"
           autocomplete="current-password" />
  </div>

  <!-- Login Button -->
  <button class="btn" id="loginBtn" onclick="doAdminLogin()">
    ⚙ Login as Admin
  </button>

  <!-- Credentials hint -->
  <div class="hint">
    <strong>📋 Default Admin Credentials:</strong>
    Email: <code>admin@orivya.com</code><br/><br/>
    Password: <code>admin123</code>
  </div>

  <a href="index.html" class="back-link">← Back to Shop</a>
</div>

<!-- Toast -->
<div id="toast" style="
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(100px);
  background:#1a5c2a; color:white; padding:12px 24px;
  border-radius:6px; font-weight:700; font-size:14px;
  opacity:0; transition:all 0.3s; z-index:9999;
  white-space:nowrap;
"></div>

<script src="js/api.js"></script>
<script>

  // If already logged in as admin, go straight to dashboard
  if (isLoggedIn() && isAdmin()) {
    window.location.href = 'admin.html';
  }

  async function doAdminLogin() {
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value.trim();
    const btn      = document.getElementById('loginBtn');
    const errBox   = document.getElementById('errorBox');
    const okBox    = document.getElementById('successBox');

    // Clear messages
    errBox.style.display = 'none';
    okBox.style.display  = 'none';

    if (!email || !password) {
      errBox.textContent  = '⚠ Please enter email and password.';
      errBox.style.display = 'block';
      return;
    }

    btn.textContent = '⏳ Logging in...';
    btn.disabled    = true;

    try {
      const data = await apiLogin(email, password);

      if (data.success && data.data) {
        const role = data.data.role;
        const name = data.data.name;

        if (role !== 'ADMIN') {
          // Not an admin account
          clearSession();
          errBox.textContent  = '❌ This account is not an Admin. Please use the admin email.';
          errBox.style.display = 'block';
          btn.textContent = '⚙ Login as Admin';
          btn.disabled    = false;
          return;
        }

        // Success!
        okBox.textContent  = '✅ Welcome, ' + name + '! Opening Admin Dashboard...';
        okBox.style.display = 'block';

        // Go to admin dashboard after 1 second
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1000);

      } else {
        errBox.textContent  = '❌ ' + (data.message || 'Login failed.');
        errBox.style.display = 'block';
        btn.textContent = '⚙ Login as Admin';
        btn.disabled    = false;
      }

    } catch (err) {
      const msg = err.message || '';
      if (msg.includes('refused') || msg.includes('fetch')) {
        errBox.textContent = '❌ Cannot connect. Make sure Spring Boot is running on port 8080.';
      } else {
        errBox.textContent = '❌ Wrong email or password. Try: admin@orivya.com / admin123';
      }
      errBox.style.display = 'block';
      btn.textContent = '⚙ Login as Admin';
      btn.disabled    = false;
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doAdminLogin();
  });

</script>
</body>
</html>
