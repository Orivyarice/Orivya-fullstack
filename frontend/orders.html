<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Orders – Orivya Rice</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">
      <img src="Images/Logo.jpeg" alt="Logo" class="logo-img"
           onerror="this.style.display='none';this.parentNode.innerHTML='🌾'" />
    </div>
    <div class="nav-logo-text">ORIVYA <span>Premium Rice</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#shop">Shop</a></li>
    <li><a href="orders.html">My Orders</a></li>
  </ul>
  <div class="nav-actions">
    <span id="navUserName" class="nav-username"></span>
    <a href="index.html" id="loginBtn" class="btn-nav" style="display:none">← Shop</a>
    <button id="logoutBtn" class="btn-nav" onclick="apiLogout()" style="display:none">Logout</button>
    <button class="cart-btn" onclick="window.location.href='index.html'">
      🛒 Shop <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- ── ORDERS PAGE ── -->
<div class="orders-container">
  <h2 class="orders-title">📋 My Orders</h2>

  <!-- Filter Bar -->
  <div style="display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap">
    <button class="page-btn active" id="filter-ALL" onclick="filterOrders('ALL', this)">All Orders</button>
    <button class="page-btn" id="filter-PENDING"   onclick="filterOrders('PENDING', this)">Pending</button>
    <button class="page-btn" id="filter-CONFIRMED" onclick="filterOrders('CONFIRMED', this)">Confirmed</button>
    <button class="page-btn" id="filter-SHIPPED"   onclick="filterOrders('SHIPPED', this)">Shipped</button>
    <button class="page-btn" id="filter-DELIVERED" onclick="filterOrders('DELIVERED', this)">Delivered</button>
  </div>

  <!-- Orders List -->
  <div id="ordersList">
    <div style="text-align:center;padding:60px"><div class="spinner"></div></div>
  </div>
</div>

<!-- ── FLOATING WA ── -->
<div class="float-wa-wrapper" onclick="window.open('https://wa.me/916304212346','_blank')">
  <div class="float-wa-pulse"></div>
  <div class="float-wa-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </div>
  <div class="float-wa-label">Help?</div>
</div>

<div class="toast" id="toast"></div>
<script src="js/api.js"></script>
<script>
  let allOrders = [];

  document.addEventListener('DOMContentLoaded', async () => {
    if (!requireLogin()) return;
    updateNavbar();
    loadCartCount();
    await loadMyOrders();
  });

  async function loadMyOrders() {
    try {
      const data = await apiGetMyOrders();
      allOrders = data.data || [];
      renderOrders(allOrders);
    } catch (e) {
      document.getElementById('ordersList').innerHTML =
        `<div style="text-align:center;padding:60px;color:#999">
          <p style="font-size:16px">Failed to load orders.</p>
          <small>${e.message}</small>
        </div>`;
    }
  }

  function filterOrders(status, btn) {
    // Update active button
    document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filtered = status === 'ALL'
      ? allOrders
      : allOrders.filter(o => o.status === status);
    renderOrders(filtered);
  }

  function renderOrders(orders) {
    const el = document.getElementById('ordersList');

    if (!orders || orders.length === 0) {
      el.innerHTML = `
        <div style="text-align:center;padding:80px 20px;color:#999">
          <div style="font-size:56px;margin-bottom:16px">📦</div>
          <p style="font-size:18px;font-weight:700;color:#555;margin-bottom:8px">No orders yet</p>
          <p style="font-size:14px">You haven't placed any orders.<br>Go to the shop and order some premium rice!</p>
          <a href="index.html#shop" class="btn-primary" style="display:inline-block;margin-top:20px;padding:14px 28px">
            Browse Products →
          </a>
        </div>`;
      return;
    }

    el.innerHTML = orders.map(order => `
      <div class="order-card">
        <!-- Header -->
        <div class="order-card-header">
          <div>
            <div class="order-id">Order #${order.orderId}</div>
            <div style="font-size:12px;opacity:0.8;margin-top:2px">${formatDate(order.createdAt)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="order-status-pill status-${order.status}">${order.status}</span>
            <span style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#e8b44a">${formatPrice(order.totalPrice)}</span>
          </div>
        </div>

        <!-- Body -->
        <div class="order-card-body">
          <!-- Order Meta -->
          <div class="order-meta">
            <span>💳 Payment: <strong>${order.paymentMethod || 'N/A'}</strong></span>
            <span>📍 ${truncate(order.deliveryAddress, 50)}</span>
            <span style="color:${order.paymentStatus === 'PAID' ? '#155724' : '#856404'};font-weight:700">
              ${order.paymentStatus === 'PAID' ? '✅ Paid' : '⏳ Payment Pending'}
            </span>
          </div>

          <!-- Order Items -->
          <div class="order-items-list">
            <div style="font-size:12px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Items Ordered</div>
            ${(order.items || []).map(item => `
              <div class="order-item-row">
                <div style="display:flex;align-items:center;gap:10px">
                  <div style="width:40px;height:40px;background:#f0f7f0;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0">
                    <img src="${getImageUrl(item.productImage)}" style="width:100%;height:100%;object-fit:contain"
                         onerror="this.parentNode.textContent='🌾'"/>
                  </div>
                  <div>
                    <div style="font-weight:700;font-size:14px;color:#1a5c2a">${item.productName}</div>
                    <div style="font-size:12px;color:#888">× ${item.quantity} &nbsp;@ ${formatPrice(item.unitPrice)}</div>
                  </div>
                </div>
                <div style="font-weight:700;color:#c8922a">${formatPrice(item.subtotal)}</div>
              </div>
            `).join('')}
          </div>

          <!-- Total Row -->
          <div class="order-total-row">
            <span>Total Amount</span>
            <span>${formatPrice(order.totalPrice)}</span>
          </div>

          <!-- Actions -->
          <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
            ${order.status !== 'DELIVERED' && order.status !== 'CANCELLED' ? `
              <button onclick="trackOnWhatsApp('${order.orderId}')" class="wa-direct-btn"
                style="width:auto;padding:10px 20px;font-size:13px">
                💬 Track on WhatsApp
              </button>` : ''}
            ${order.status === 'DELIVERED' ? `
              <button onclick="reorderOnWhatsApp(${JSON.stringify(order.items).replace(/"/g,'&quot;')})"
                class="btn-primary btn-sm">
                🔄 Reorder
              </button>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── HELPERS ──
  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
    } catch { return dateStr.split('T')[0]; }
  }

  function truncate(str, maxLen) {
    if (!str) return 'N/A';
    return str.length > maxLen ? str.substring(0, maxLen) + '...' : str;
  }

  function trackOnWhatsApp(orderId) {
    const msg = encodeURIComponent(`🌾 Hi Orivya Rice!\n\nCan you please update me on the status of my order #${orderId}?\n\nThank you!`);
    window.open(`https://wa.me/916304212346?text=${msg}`, '_blank');
  }

  function reorderOnWhatsApp(items) {
    const itemList = items.map(i => `• ${i.productName} × ${i.quantity}`).join('\n');
    const msg = encodeURIComponent(`🌾 Hi! I'd like to reorder:\n\n${itemList}\n\nPlease confirm availability and total amount. Thank you!`);
    window.open(`https://wa.me/916304212346?text=${msg}`, '_blank');
  }
</script>
</body>
</html>
