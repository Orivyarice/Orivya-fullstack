<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Setup – Orivya Rice</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2a15, #1a5c2a);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: white; border-radius: 16px;
      padding: 40px; width: 100%; max-width: 460px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    }
    h1 { font-size: 22px; color: #1a5c2a; margin-bottom: 6px; }
    .sub { color: #888; font-size: 13px; margin-bottom: 28px; }

    .step {
      background: #f0f7f0; border: 1px solid rgba(26,92,42,0.2);
      border-radius: 8px; padding: 16px 18px; margin-bottom: 16px;
    }
    .step-num {
      display: inline-block; width: 24px; height: 24px;
      background: #1a5c2a; color: white; border-radius: 50%;
      text-align: center; line-height: 24px; font-size: 12px;
      font-weight: 700; margin-right: 8px;
    }
    .step-title { font-weight: 700; color: #1a5c2a; font-size: 14px; }
    .step-body { margin-top: 10px; font-size: 13px; color: #555; }

    label { display:block; font-size:11px; font-weight:700; color:#1a5c2a; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; margin-top:12px; }
    input {
      width:100%; padding:11px 14px;
      border: 2px solid rgba(26,92,42,0.2); border-radius:6px;
      font-size:14px; outline:none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #1a5c2a; }

    .btn {
      width:100%; margin-top:18px;
      background: linear-gradient(135deg,#1a5c2a,#2d7a3e);
      color:white; border:none; padding:15px;
      border-radius:6px; font-size:15px; font-weight:700;
      cursor:pointer; transition: all 0.3s;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(26,92,42,0.35); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    .result {
      margin-top:16px; padding:14px 16px;
      border-radius:6px; font-size:14px; font-weight:700;
      display:none; line-height: 1.6;
    }
    .success { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
    .error   { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }

    .goto-btn {
      display:block; margin-top:14px; text-align:center;
      background:#c8922a; color:white; padding:12px;
      border-radius:6px; font-weight:700; text-decoration:none;
      font-size:14px; transition: all 0.2s;
    }
    .goto-btn:hover { background:#e8b44a; }
  </style>
</head>
<body>
<div class="card">
  <h1>⚙ Admin Account Setup</h1>
  <p class="sub">Create your admin account for Orivya Rice</p>

  <!-- Step 1 -->
  <div class="step">
    <span class="step-num">1</span>
    <span class="step-title">Make sure Spring Boot is running</span>
    <div class="step-body">
      Backend must be running at
      <strong style="color:#1a5c2a">http://localhost:8080</strong><br/>
      Run: <code style="background:#e8f5e9;padding:2px 6px;border-radius:3px">mvn spring-boot:run</code>
    </div>
  </div>

  <!-- Step 2 -->
  <div class="step">
    <span class="step-num">2</span>
    <span class="step-title">Fill in admin details and click Create</span>
    <div class="step-body">The password will be securely hashed by Spring Boot.</div>
  </div>

  <!-- Form -->
  <label>Admin Name</label>
  <input type="text" id="adminName" value="Orivya Admin" placeholder="Admin name"/>

  <label>Admin Email</label>
  <input type="email" id="adminEmail" value="orivyaorganicrice@gmail.com" placeholder="orivyaorganicrice@gmail.com"/>

  <label>Admin Password</label>
  <input type="text" id="adminPassword" value=" " placeholder="Choose a password"/>

  <label>Phone</label>
  <input type="text" id="adminPhone" value="6304212346" placeholder="Phone number"/>

  <button class="btn" id="createBtn" onclick="createAdmin()">
    ✅ Create Admin Account
  </button>

  <!-- Result box -->
  <div class="result success" id="successResult"></div>
  <div class="result error"   id="errorResult"></div>

  <!-- Go to login (shown after success) -->
  <a href="admin-login.html" id="gotoLogin" class="goto-btn" style="display:none">
    → Go to Admin Login Page
  </a>
</div>

<script>
async function createAdmin() {
  const name     = document.getElementById('adminName').value.trim();
  const email    = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value.trim();
  const phone    = document.getElementById('adminPhone').value.trim();
  const btn      = document.getElementById('createBtn');
  const okBox    = document.getElementById('successResult');
  const errBox   = document.getElementById('errorResult');

  okBox.style.display  = 'none';
  errBox.style.display = 'none';

  if (!name || !email || !password) {
    errBox.textContent   = '⚠ Please fill name, email and password.';
    errBox.style.display = 'block';
    return;
  }

  btn.textContent = '⏳ Creating admin account...';
  btn.disabled    = true;

  try {
    const res = await fetch('http://localhost:8080/api/auth/register-admin', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name, email, password, phone })
    });

    const data = await res.json();

    if (data.success) {
      okBox.innerHTML = `
        ✅ <strong>Admin account created successfully!</strong><br/><br/>
        📧 Email: <strong>${email}</strong><br/>
        🔑 Password: <strong>${password}</strong><br/><br/>
        <span style="font-size:12px;color:#155724">
          ✔ Password has been securely hashed by Spring Boot (BCrypt)<br/>
          ✔ You can now login with these credentials
        </span>`;
      okBox.style.display = 'block';
      document.getElementById('gotoLogin').style.display = 'block';
    } else {
      // Email already exists — admin already created
      if (data.message && data.message.toLowerCase().includes('already')) {
        okBox.innerHTML = `
          ℹ️ <strong>Admin account already exists!</strong><br/><br/>
          📧 Email: <strong>${email}</strong><br/>
          🔑 Password: <strong>${password}</strong> (the one you set before)<br/><br/>
          <span style="font-size:12px">If you forgot the password, delete the user in MySQL and run this again.</span>`;
        okBox.style.display = 'block';
        document.getElementById('gotoLogin').style.display = 'block';
      } else {
        errBox.textContent   = '❌ ' + (data.message || 'Creation failed.');
        errBox.style.display = 'block';
      }
    }

  } catch (err) {
    if (err.message.includes('fetch') || err.message.includes('refused')) {
      errBox.innerHTML = `
        ❌ <strong>Cannot connect to Spring Boot.</strong><br/><br/>
        Make sure the backend is running:<br/>
        <code style="background:#f8d7da;padding:3px 8px;border-radius:3px">cd backend → mvn spring-boot:run</code><br/><br/>
        Wait for: <em>"Started OrivyaApplication"</em> then try again.`;
    } else {
      errBox.textContent = '❌ ' + err.message;
    }
    errBox.style.display = 'block';
  } finally {
    btn.textContent = '✅ Create Admin Account';
    btn.disabled    = false;
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') createAdmin();
});
</script>
</body>
</html>
